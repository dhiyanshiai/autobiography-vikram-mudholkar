<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - My Story</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f2a44, #0d0d14 65%);
      color: #e2e2ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #16161f;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.25rem; }
    p { margin: 0 0 18px; color: #9aa0b8; font-size: 0.9rem; }
    label { font-size: 0.78rem; color: #9aa0b8; font-weight: 600; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      margin-bottom: 14px;
      background: #1e1e2a;
      border: 1px solid #2a2a38;
      color: #e2e2ed;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #7c6af7;
      color: #fff;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { margin-top: 10px; font-size: 0.85rem; color: #f87171; min-height: 1.2em; }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>Secure Access</h1>
    <p>Enter your username and password to continue.</p>

    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <button id="submit-btn" type="submit">Log In</button>
    <div id="msg"></div>
  </form>

  <script>
    var form = document.getElementById('login-form');
    var btn = document.getElementById('submit-btn');
    var msg = document.getElementById('msg');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });

        if (!res.ok) {
          var data = await res.json().catch(function() { return {}; });
          throw new Error(data.message || 'Login failed');
        }

        window.location.href = '/';
      } catch (err) {
        msg.textContent = err.message || 'Login failed';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
